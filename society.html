<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第1章 情報社会の問題解決 - 情報I PORTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        .chapter-icon { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 font-bold text-slate-800 hover:opacity-70 transition">
                <i class="ph ph-arrow-left"></i> <span>HOMEに戻る</span>
            </a>
            <span class="text-sm font-bold text-sky-600">Chapter 01</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="flex items-center gap-5 mb-12">
            <div class="chapter-icon p-4 rounded-2xl shadow-lg">
                <i class="ph ph-users-three text-white text-3xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 leading-tight">情報社会の問題解決</h1>
                <p class="text-slate-500">情報技術が社会に与える影響と、私たちの責任。</p>
            </div>
        </div>

        <div class="grid gap-8">
            <section class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-sky-700">
                    <span class="w-1.5 h-6 bg-sky-500 rounded-full"></span>
                    情報の特性とメディア
                </h2>
                <div class="grid md:grid-cols-3 gap-4 text-sm text-slate-600">
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 font-medium text-center">残存性</div>
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 font-medium text-center">複製性</div>
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 font-medium text-center">伝播性</div>
                </div>
            </section>

            <section class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-sky-700">
                    <span class="w-1.5 h-6 bg-sky-500 rounded-full"></span>
                    知的財産権と個人情報
                </h2>
                <div class="space-y-4">
                    <div class="p-5 border border-amber-100 bg-amber-50 rounded-2xl text-sm leading-relaxed">
                        <strong class="text-amber-800 block mb-1">💡 著作権のポイント</strong>
                        著作物を作った時点で発生し、死後70年まで保護されます。他人の画像や文章を勝手に使うことは原則禁止です。
                    </div>
                    <div class="p-5 border border-sky-100 bg-sky-50 rounded-2xl text-sm leading-relaxed">
                        <strong class="text-sky-800 block mb-1">🔒 個人情報の保護</strong>
                        名前、住所だけでなく、顔写真や指紋、マイナンバーなども含まれます。
                    </div>
                </div>
            </section>
        </div>
    </main>

</body>
</html>
