<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情報I 学習ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <nav class="glass sticky top-0 z-50 border-b border-slate-700">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-sky-500 p-1.5 rounded-lg">
                    <i class="ph ph-terminal-window text-white text-xl"></i>
                </div>
                <span class="font-bold text-lg tracking-tighter text-white">情報I PORTAL</span>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="index.html" class="text-sky-400">ホーム</a>
                <a href="network.html" class="hover:text-sky-400 transition">ネットワーク</a>
                <a href="coding.html" class="hover:text-sky-400 transition">プログラミング</a>
                <a href="data.html" class="hover:text-sky-400 transition">データ活用</a>
            </div>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-20 text-center">
        <h1 class="text-5xl md:text-6xl font-extrabold text-white mb-6">
            未来を創る、<span class="text-sky-400">情報の力。</span>
        </h1>
        <p class="text-slate-400 text-lg max-w-2xl mx-auto">
            コンピュータの仕組みからプログラミング、データの分析まで。
            情報Iのすべての学びをここに集約。
        </p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <a href="network.html" class="glass p-8 rounded-3xl border border-slate-700 hover:border-sky-500/50 transition-all group">
                <i class="ph ph-globe-hemisphere-west text-4xl text-sky-400 mb-4"></i>
                <h2 class="text-xl font-bold text-white mb-2">ネットワーク</h2>
                <p class="text-sm text-slate-400 leading-relaxed">インターネットが繋がる仕組みや、セキュリティの基礎を学びます。</p>
                <div class="mt-6 flex items-center text-xs font-bold text-sky-400 uppercase tracking-widest">
                    Learn More <i class="ph ph-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                </div>
            </a>

            <a href="coding.html" class="glass p-8 rounded-3xl border border-slate-700 hover:border-sky-500/50 transition-all group">
                <i class="ph ph-code text-4xl text-sky-400 mb-4"></i>
                <h2 class="text-xl font-bold text-white mb-2">プログラミング</h2>
                <p class="text-sm text-slate-400 leading-relaxed">Pythonを使って、アルゴリズムと論理的な思考を身につけます。</p>
                <div class="mt-6 flex items-center text-xs font-bold text-sky-400 uppercase tracking-widest">
                    Learn More <i class="ph ph-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                </div>
            </a>

            <a href="data.html" class="glass p-8 rounded-3xl border border-slate-700 hover:border-sky-500/50 transition-all group">
                <i class="ph ph-chart-bar text-4xl text-sky-400 mb-4"></i>
                <h2 class="text-xl font-bold text-white mb-2">データ活用</h2>
                <p class="text-sm text-slate-400 leading-relaxed">膨大なデータから価値を見出し、分析・可視化する手法を学びます。</p>
                <div class="mt-6 flex items-center text-xs font-bold text-sky-400 uppercase tracking-widest">
                    Learn More <i class="ph ph-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                </div>
            </a>

        </div>
    </main>

    <footer class="text-center py-10 border-t border-slate-800 text-slate-500 text-xs">
        &copy; 2026 情報Iポータルサイト構築プロジェクト
    </footer>

</body>
</html>
